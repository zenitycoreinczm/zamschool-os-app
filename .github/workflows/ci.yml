name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel in-progress runs for the same branch on a new push.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Lint + tests
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: ESLint
        # `npm run lint` runs `eslint .` over the repo. Fails on any warning or error.
        run: npm run lint

      - name: Static-grep test suite
        # `npm test` runs the project's static-grep harness under __tests__/ and
        # the worker edge tests under workers/gateway/src/*.test.mjs.
        # Runner: scripts/run-tests.mjs (batches of 8 files at a time).
        run: npm test

      - name: Schema check (strict)
        # Verifies migrations are internally consistent: required tables exist,
        # RLS is enabled on every table, no duplicate migration names.
        run: npm run schema:check:strict

      - name: Tenant audit (strict)
        # Fails if any service-role query touches a tenant-scoped table
        # without an explicit school_id filter (or documented exception).
        run: npm run audit:tenant:strict

      - name: Route coverage audit
        # Fails if any mutation route is missing auth, feature checks, or
        # audit logs AND is not listed in eslint-rules/route-audit-exemptions.json.
        run: npm run audit:routes

  build:
    name: Next.js build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    # Run build on both PRs and push to main — catching build-only regressions
    # at PR time prevents broken deploys to staging.
    needs: test

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build (Next.js standalone)
        # Runs `next build --webpack` plus the standalone preparation step
        # (`scripts/prepare-standalone.mjs` via `postbuild`). No deploy step
        # here — Vercel handles that on its own pipeline.
        env:
          NEXT_TELEMETRY_DISABLED: "1"
        run: npm run build
